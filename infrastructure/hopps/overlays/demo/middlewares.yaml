# CORS for API/Keycloak from the demo frontend origin
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: cors
spec:
  headers:
    accessControlAllowMethods:
      - GET
      - POST
      - PUT
      - PATCH
      - DELETE
      - OPTIONS
    accessControlAllowHeaders:
      - "*"
    accessControlAllowOriginList:
      - "https://demo.${DOMAIN_2}"
    accessControlMaxAge: 100
    addVaryHeader: true
---
# Strip /org prefix before forwarding to the org backend
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: strip-org
spec:
  stripPrefix:
    prefixes:
      - /org
---
# Allow up to 50 MiB request bodies for the org API (replaces nginx proxy-body-size)
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: body-50m
spec:
  buffering:
    maxRequestBodyBytes: 52428800
