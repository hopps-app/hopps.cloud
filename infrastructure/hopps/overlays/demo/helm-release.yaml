apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: hopps
spec:
  chart:
    spec:
      chart: hopps
      sourceRef:
        kind: HelmRepository
        name: hopps
      version: 0.2.5
  interval: 1m0s
  values:
    # az-document-ai
    azDocumentAi:
      image:
        tag: "841"
      envFrom:
        - secretRef:
            name: az-document-ai
    # org
    org:
      image:
        tag: "841"
      envFrom:
        - secretRef:
            name: org
      envVars:
        # OpenFGA
        # ToDo: automatically set store name, when integrated openfga enabled
        - name: QUARKUS_OPENFGA_STORE
          value: hopps
        - name: quarkus.swagger-ui.always-include
          value: "true"
        - name: quarkus.swagger-ui.enable
          value: "true"
        - name: quarkus.swagger-ui.path
          value: /q/swagger-ui
        - name: quarkus.smallrye-openapi.path
          value: /q/openapi
        # Database secrets
        - name: quarkus.datasource.jdbc.url
          value: jdbc:postgresql://postgres-cluster-rw:5432/org?loggerLevel=OFF&sslmode=require
        - name: quarkus.datasource.username
          valueFrom:
            secretKeyRef:
              name: org-db-secret
              key: username
        - name: quarkus.datasource.password
          valueFrom:
            secretKeyRef:
              name: org-db-secret
              key: password
      ingress:
        enabled: true
        annotations:
          cert-manager.io/cluster-issuer: letsencrypt-prod
          nginx.ingress.kubernetes.io/enable-cors: "true"
          nginx.ingress.kubernetes.io/cors-allow-origin: "https://demo.${DOMAIN_2}"
          nginx.ingress.kubernetes.io/rewrite-target: /$2
        ingressClassName: nginx
        hosts:
          - host: api.demo.${DOMAIN_2}
            paths:
              - path: /org(/|$)(.*)
                pathType: ImplementationSpecific
        tls:
          - secretName: api-tls
            hosts:
              - api.demo.${DOMAIN_2}
      managementIngress:
        enabled: false
    # disable subchart for postgresql
    postgresql-org:
      enabled: false
    # frontend
    frontend:
      image:
        tag: "897"
      envFrom:
        - secretRef:
            name: frontend
      podSecurityContext:
        fsGroup: 1000
      ingress:
        enabled: true
        annotations:
          cert-manager.io/cluster-issuer: letsencrypt-prod
        ingressClassName: nginx
        hosts:
          - host: demo.${DOMAIN_2}
            paths:
              - path: /
                pathType: Prefix
        tls:
          - secretName: frontend-tls
            hosts:
              - demo.${DOMAIN_2}
    zugferd:
      image:
        tag: "838"
    keycloak:
      http:
        # For backwards compatibility reasons we set this to the value used by previous Keycloak versions.
        relativePath: "/"
      image:
        tag: 18-keycloak-26.2.1
      enabled: false
      database:
        vendor: postgres
        hostname: postgres-cluster-rw
        port: 5432
        database: keycloak
        username: keycloak
        existingSecret: keycloak-db-secret
      ingress:
        enabled: true
        annotations:
          cert-manager.io/cluster-issuer: letsencrypt-prod
          nginx.ingress.kubernetes.io/enable-cors: "true"
          nginx.ingress.kubernetes.io/cors-allow-origin: "https://demo.${DOMAIN_2}"
          # disable public access to metrics endpoint
          nginx.ingress.kubernetes.io/server-snippet: |
            location ~* /auth/realms/[^/]+/metrics {
                return 403;
            }
        rules:
          - host: id.demo.${DOMAIN_2}
            paths:
              - path: '{{ tpl .Values.http.relativePath $ | trimSuffix "/" }}/'
                pathType: Prefix
        tls:
          - secretName: keycloak-tls
            hosts:
              - id.demo.${DOMAIN_2}
        ingressClassName: nginx
      serviceMonitor:
        enabled: true
