apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: hopps
spec:
  chart:
    spec:
      chart: hopps
      sourceRef:
        kind: HelmRepository
        name: hopps
      version: 0.2.7
  interval: 1m0s
  values:
    # az-document-ai
    azDocumentAi:
      image:
        tag: "897"
      envFrom:
        - secretRef:
            name: az-document-ai
    # org
    org:
      image:
        tag: "897"
      envFrom:
        - secretRef:
            name: org
      envVars:
        # OpenFGA
        # ToDo: automatically set store name, when integrated openfga enabled
        - name: QUARKUS_OPENFGA_STORE
          value: hopps
        - name: quarkus.swagger-ui.always-include
          value: "true"
        - name: quarkus.swagger-ui.enable
          value: "true"
        - name: quarkus.swagger-ui.path
          value: /q/swagger-ui
        - name: quarkus.smallrye-openapi.path
          value: /q/openapi
        # Database secrets
        - name: quarkus.datasource.jdbc.url
          value: jdbc:postgresql://postgres-cluster-rw:5432/org?loggerLevel=OFF&sslmode=require
        - name: quarkus.datasource.username
          valueFrom:
            secretKeyRef:
              name: org-db-secret
              key: username
        - name: quarkus.datasource.password
          valueFrom:
            secretKeyRef:
              name: org-db-secret
              key: password
      ingress:
        enabled: true
        annotations:
          cert-manager.io/cluster-issuer: letsencrypt-prod
          traefik.ingress.kubernetes.io/router.middlewares: hopps-demo-cors@kubernetescrd,hopps-demo-strip-org@kubernetescrd,hopps-demo-body-50m@kubernetescrd
        ingressClassName: traefik
        hosts:
          - host: api.demo.${DOMAIN_2}
            paths:
              - path: /org
                pathType: Prefix
        tls:
          - secretName: api-tls
            hosts:
              - api.demo.${DOMAIN_2}
      managementIngress:
        enabled: false
    # disable subchart for postgresql
    postgresql-org:
      enabled: false
    # frontend
    frontend:
      image:
        tag: "1006"
      envFrom:
        - secretRef:
            name: frontend
      podSecurityContext:
        fsGroup: 1000
      ingress:
        enabled: true
        annotations:
          cert-manager.io/cluster-issuer: letsencrypt-prod
        ingressClassName: traefik
        hosts:
          - host: demo.${DOMAIN_2}
            paths:
              - path: /
                pathType: Prefix
        tls:
          - secretName: frontend-tls
            hosts:
              - demo.${DOMAIN_2}
    zugferd:
      image:
        tag: "892"
      envFrom:
        - secretRef:
            name: zugferd
    keycloak:
      enabled: false
