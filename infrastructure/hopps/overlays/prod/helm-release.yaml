apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: hopps
spec:
  chart:
    spec:
      chart: hopps
      sourceRef:
        kind: HelmRepository
        name: hopps
      version: 0.1.4
  interval: 1m0s
  values:
    # az-document-ai
    azDocumentAi:
      image:
        tag: 614
      envFrom:
        - secretRef:
            name: az-document-ai
    # org
    org:
      image:
        tag: 614
      envFrom:
        - secretRef:
            name: org
      envVars:
        # OpenFGA
        # ToDo: automatically set store name, when integrated openfga enabled
        - name: QUARKUS_OPENFGA_STORE
          value: hopps
        # Database secrets
        - name: quarkus.datasource.jdbc.url
          value: jdbc:postgresql://postgres-cluster-rw:5432/org?loggerLevel=OFF&sslmode=require
        - name: quarkus.datasource.username
          valueFrom:
            secretKeyRef:
              name: org-db-secret
              key: username
        - name: quarkus.datasource.password
          valueFrom:
            secretKeyRef:
              name: org-db-secret
              key: password
      ingress:
        enabled: true
        annotations:
          cert-manager.io/cluster-issuer: letsencrypt-prod
          traefik.ingress.kubernetes.io/router.middlewares: hopps-prod-cors@kubernetescrd,hopps-prod-strip-org@kubernetescrd
        ingressClassName: traefik
        hosts:
          - host: api.${DOMAIN_2}
            paths:
              - path: /org
                pathType: Prefix
        tls:
          - secretName: api-tls
            hosts:
              - api.${DOMAIN_2}
    # disable subchart for postgresql
    postgresql-org:
      enabled: false
    # fin
    fin:
      image:
        tag: 614
      envFrom:
        - secretRef:
            name: fin
      envVars:
        # OpenFGA
        # ToDo: automatically set store name, when integrated openfga enabled
        - name: QUARKUS_OPENFGA_STORE
          value: hopps
        # Database secrets
        - name: quarkus.datasource.jdbc.url
          value: jdbc:postgresql://postgres-cluster-rw:5432/fin?loggerLevel=OFF&sslmode=require
        - name: quarkus.datasource.username
          valueFrom:
            secretKeyRef:
              name: fin-db-secret
              key: username
        - name: quarkus.datasource.password
          valueFrom:
            secretKeyRef:
              name: fin-db-secret
              key: password
      ingress:
        enabled: true
        annotations:
          cert-manager.io/cluster-issuer: letsencrypt-prod
          traefik.ingress.kubernetes.io/router.middlewares: hopps-prod-cors@kubernetescrd,hopps-prod-strip-fin@kubernetescrd
        ingressClassName: traefik
        hosts:
          - host: api.${DOMAIN_2}
            paths:
              - path: /fin
                pathType: Prefix
        tls:
          - secretName: api-tls
            hosts:
              - api.${DOMAIN_2}
    postgresql-fin:
      enabled: false
    # finNarrator
    finNarrator:
      image:
        tag: 614
      envVars:
        - name: quarkus.langchain4j.openai.api-key
          valueFrom:
            secretKeyRef:
              name: openai-api-key
              key: apikey
    # frontend
    frontend:
      image:
        tag: "368"
      envFrom:
        - secretRef:
            name: frontend
      podSecurityContext:
        fsGroup: 1000
      ingress:
        enabled: true
        annotations:
          cert-manager.io/cluster-issuer: letsencrypt-prod
        ingressClassName: traefik
        hosts:
          - host: ${DOMAIN_2}
            paths:
              - path: /
                pathType: Prefix
        tls:
          - secretName: frontend-tls
            hosts:
              - ${DOMAIN_2}
    zugferd:
      image:
        tag: 614
    kafka:
      enabled: true
      controller:
        replicaCount: 1
        resourcesPreset: "none"
      volumePermissions:
        resourcesPreset: "none"
      # disable authentication for kafka for now
      listeners:
        client:
          protocol: PLAINTEXT
    kafka-ui:
      enabled: true
      yamlApplicationConfig:
        kafka:
          clusters:
            - name: yaml
              # ToDo: url should automatically be calculated, dependent on the name of the release-name
              bootstrapServers: hopps-kafka:9092
        auth:
          type: disabled
        management:
          health:
            ldap:
              enabled: false
      ingress:
        enabled: true
        ingressClassName: traefik
        annotations:
          cert-manager.io/cluster-issuer: letsencrypt-prod
          # basic auth
          traefik.ingress.kubernetes.io/router.middlewares: hopps-prod-kafka-ui-auth@kubernetescrd
          # configure oauth2-proxy security ToDo: waiting for keycloak GitHub integration for SSO
          # traefik.ingress.kubernetes.io/router.middlewares: hopps-prod-kafka-ui-auth@kubernetescrd,traefik-oauth-forwardauth@kubernetescrd,traefik-oauth-forwardauth-service@kubernetescrd
        tls:
          enabled: true
          secretName: kafka-tls
        host: kafka-ui.${DOMAIN_2}
    # reuse dev keycloak for now
    keycloak:
      http:
        # For backwards compatibility reasons we set this to the value used by previous Keycloak versions.
        relativePath: "/"
      image:
        tag: 18-keycloak-26.2.1
      enabled: true
      database:
        vendor: postgres
        hostname: postgres-cluster-rw
        port: 5432
        database: keycloak
        username: keycloak
        existingSecret: keycloak-db-secret
      ingress:
        enabled: true
        annotations:
          cert-manager.io/cluster-issuer: letsencrypt-prod
          traefik.ingress.kubernetes.io/router.middlewares: hopps-prod-cors@kubernetescrd
          # ToDo: re-implement public /metrics block (server-snippet replacement) — either via
          # Keycloak/Quarkus management interface or a dedicated traefik IngressRoute that 403s the path
        rules:
          - host: id.${DOMAIN_2}
            paths:
              - path: '{{ tpl .Values.http.relativePath $ | trimSuffix "/" }}/'
                pathType: Prefix
        tls:
          - secretName: keycloak-tls
            hosts:
              - id.${DOMAIN_2}
        ingressClassName: traefik
      serviceMonitor:
        enabled: true
