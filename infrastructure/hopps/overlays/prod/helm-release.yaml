apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: hopps
spec:
  chart:
    spec:
      chart: hopps
      sourceRef:
        kind: HelmRepository
        name: hopps
      version: 0.2.7
  interval: 1m0s
  values:
    # az-document-ai
    azDocumentAi:
      image:
        tag: "856"
      envFrom:
        - secretRef:
            name: az-document-ai
    # org
    org:
      image:
        tag: "856"
      envFrom:
        - secretRef:
            name: org
      envVars:
        # Database secrets
        - name: quarkus.datasource.jdbc.url
          value: jdbc:postgresql://postgres-cluster-rw:5432/org?loggerLevel=OFF&sslmode=require
        - name: quarkus.swagger-ui.path
          value: /q/swagger-ui
        - name: quarkus.smallrye-openapi.path
          value: /q/openapi
        - name: quarkus.datasource.username
          valueFrom:
            secretKeyRef:
              name: org-db-secret
              key: username
        - name: quarkus.datasource.password
          valueFrom:
            secretKeyRef:
              name: org-db-secret
              key: password
      ingress:
        enabled: true
        annotations:
          cert-manager.io/cluster-issuer: letsencrypt-prod
          traefik.ingress.kubernetes.io/router.middlewares: hopps-prod-cors@kubernetescrd,hopps-prod-strip-org@kubernetescrd,hopps-prod-body-50m@kubernetescrd
        ingressClassName: traefik
        hosts:
          - host: api.${DOMAIN_2}
            paths:
              - path: /org
                pathType: Prefix
        tls:
          - secretName: api-tls
            hosts:
              - api.${DOMAIN_2}
      managementIngress:
        enabled: false
    # disable subchart for postgresql
    postgresql-org:
      enabled: false
    # frontend
    frontend:
      image:
        tag: "897"
      envFrom:
        - secretRef:
            name: frontend
      podSecurityContext:
        fsGroup: 1000
      ingress:
        enabled: true
        annotations:
          cert-manager.io/cluster-issuer: letsencrypt-prod
        ingressClassName: traefik
        hosts:
          - host: ${DOMAIN_2}
            paths:
              - path: /
                pathType: Prefix
        tls:
          - secretName: frontend-tls
            hosts:
              - ${DOMAIN_2}
    zugferd:
      image:
        tag: "856"
      envFrom:
        - secretRef:
            name: zugferd
    mailDev:
      enabled: false
    keycloak:
      command:
        - /opt/keycloak/bin/kc.sh
        - start
      cache:
        type: local
        stack: ""
      extraEnv: |
        - name: KC_HOSTNAME
          value: id.hopps.cloud
      http:
        # For backwards compatibility reasons we set this to the value used by previous Keycloak versions.
        relativePath: "/"
      image:
        tag: 115-keycloak-26.2.1
      enabled: true
      database:
        vendor: postgres
        hostname: postgres-cluster-rw
        port: 5432
        database: keycloak
        username: keycloak
        existingSecret: keycloak-db-secret
      ingress:
        enabled: true
        annotations:
          cert-manager.io/cluster-issuer: letsencrypt-prod
          traefik.ingress.kubernetes.io/router.middlewares: hopps-prod-cors@kubernetescrd
          # ToDo: re-implement public /metrics block (server-snippet replacement) — either via
          # Keycloak/Quarkus management interface or a dedicated traefik IngressRoute that 403s the path
        rules:
          - host: id.${DOMAIN_2}
            paths:
              - path: '{{ tpl .Values.http.relativePath $ | trimSuffix "/" }}/'
                pathType: Prefix
        tls:
          - secretName: keycloak-tls
            hosts:
              - id.${DOMAIN_2}
        ingressClassName: traefik
      serviceMonitor:
        enabled: true
