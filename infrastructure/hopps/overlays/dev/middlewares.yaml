# CORS for the org/management API (frontend + local dev origin)
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: cors-api
spec:
  headers:
    accessControlAllowMethods:
      - GET
      - POST
      - PUT
      - PATCH
      - DELETE
      - OPTIONS
    accessControlAllowHeaders:
      - "*"
    accessControlAllowOriginList:
      - "https://dev.${DOMAIN_2}"
      - "http://localhost:5173"
    accessControlMaxAge: 100
    addVaryHeader: true
---
# CORS for Keycloak (also reachable from the demo frontend)
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: cors-keycloak
spec:
  headers:
    accessControlAllowMethods:
      - GET
      - POST
      - PUT
      - PATCH
      - DELETE
      - OPTIONS
    accessControlAllowHeaders:
      - "*"
    accessControlAllowOriginList:
      - "https://dev.${DOMAIN_2}"
      - "https://demo.${DOMAIN_2}"
      - "http://localhost:5173"
    accessControlMaxAge: 100
    addVaryHeader: true
---
# Redirect /swagger -> /q/swagger-ui on the management host (replaces nginx server-snippet)
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: swagger-redirect
spec:
  redirectRegex:
    regex: "^https?://([^/]+)/swagger/?$"
    replacement: "https://${1}/q/swagger-ui"
    permanent: false
