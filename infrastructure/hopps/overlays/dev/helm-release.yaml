apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: hopps
spec:
  chart:
    spec:
      chart: hopps
      sourceRef:
        kind: HelmRepository
        name: hopps
      version: 0.2.7
  interval: 1m0s
  values:
    # az-document-ai
    azDocumentAi:
      image:
        tag: "892"
      envFrom:
        - secretRef:
            name: az-document-ai
    # org
    org:
      image:
        tag: "888"
      envFrom:
        - secretRef:
            name: org
      envVars:
        # Database secrets
        - name: quarkus.datasource.jdbc.url
          value: jdbc:postgresql://postgres-cluster-rw:5432/org?loggerLevel=OFF&sslmode=require
        - name: quarkus.swagger-ui.path
          value: /q/swagger-ui
        - name: quarkus.smallrye-openapi.path
          value: /q/openapi
        - name: quarkus.datasource.username
          valueFrom:
            secretKeyRef:
              name: org-db-secret
              key: username
        - name: quarkus.datasource.password
          valueFrom:
            secretKeyRef:
              name: org-db-secret
              key: password
      ingress:
        enabled: true
        annotations:
          cert-manager.io/cluster-issuer: letsencrypt-prod
          traefik.ingress.kubernetes.io/router.middlewares: hopps-dev-cors-api@kubernetescrd
        ingressClassName: traefik
        hosts:
          - host: api.dev.${DOMAIN_2}
            paths:
              - path: /
                pathType: Prefix
        tls:
          - secretName: api-tls
            hosts:
              - api.dev.${DOMAIN_2}
      managementIngress:
        enabled: true
        ingressClassName: traefik
        annotations:
          cert-manager.io/cluster-issuer: letsencrypt-prod
          # redirect /swagger -> /q/swagger-ui (regex only matches /swagger, other paths pass through)
          traefik.ingress.kubernetes.io/router.middlewares: hopps-dev-swagger-redirect@kubernetescrd
        hosts:
          - host: api.dev.${DOMAIN_2}
            paths:
              - path: /q/swagger-ui
                pathType: Prefix
              - path: /q/openapi
                pathType: Prefix
              - path: /swagger
                pathType: Exact
        tls:
          - secretName: api-tls
            hosts:
              - api.dev.${DOMAIN_2}
    # disable subchart for postgresql
    postgresql-org:
      enabled: false
    # frontend
    frontend:
      alphaVersion: true
      image:
        tag: "1006"
      envFrom:
        - secretRef:
            name: frontend
      podSecurityContext:
        fsGroup: 1000
      ingress:
        enabled: true
        annotations:
          cert-manager.io/cluster-issuer: letsencrypt-prod
        ingressClassName: traefik
        hosts:
          - host: dev.${DOMAIN_2}
            paths:
              - path: /
                pathType: Prefix
        tls:
          - secretName: frontend-tls
            hosts:
              - dev.${DOMAIN_2}
    zugferd:
      image:
        tag: "888"
      envFrom:
        - secretRef:
            name: zugferd
    # use already available keycloak
    keycloak:
      command:
        - /opt/keycloak/bin/kc.sh
        - start
      cache:
        type: local
        stack: ""
      # Traefik terminates TLS and forwards X-Forwarded-* headers, so Keycloak
      # must parse those (xforwarded) instead of the RFC 7239 `Forwarded` header
      # (chart default `forwarded`). Without this Keycloak builds http:// URLs.
      proxy:
        mode: xforwarded
      extraEnv: |
        - name: KC_HOSTNAME
          value: https://id.dev.hopps.cloud
      http:
        # For backwards compatibility reasons we set this to the value used by previous Keycloak versions.
        relativePath: "/"
      image:
        tag: 162-keycloak-26.2.1
      enabled: true
      database:
        vendor: postgres
        hostname: postgres-cluster-rw
        port: 5432
        database: keycloak
        username: keycloak
        existingSecret: keycloak-db-secret
      ingress:
        enabled: true
        annotations:
          cert-manager.io/cluster-issuer: letsencrypt-prod
          traefik.ingress.kubernetes.io/router.middlewares: hopps-dev-cors-keycloak@kubernetescrd
          # ToDo: re-implement public /metrics block (server-snippet replacement) — either via
          # Keycloak/Quarkus management interface or a dedicated traefik IngressRoute that 403s the path
        rules:
          - host: id.dev.${DOMAIN_2}
            paths:
              - path: '{{ tpl .Values.http.relativePath $ | trimSuffix "/" }}/'
                pathType: Prefix
        tls:
          - secretName: keycloak-tls
            hosts:
              - id.dev.${DOMAIN_2}
        ingressClassName: traefik
      serviceMonitor:
        enabled: true
    # mail-dev (GreenMail + Roundcube)
    mailDev:
      enabled: true
      roundcube:
        ingress:
          enabled: true
          annotations:
            cert-manager.io/cluster-issuer: letsencrypt-prod
          ingressClassName: traefik
          hosts:
            - host: mail.dev.${DOMAIN_2}
              paths:
                - path: /
                  pathType: Prefix
          tls:
            - secretName: mail-dev-tls
              hosts:
                - mail.dev.${DOMAIN_2}
